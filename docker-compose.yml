services:
  whatsapp-bot:
    image: ${WHATSAPP_IMAGE:-ghcr.io/arvindrajnaidu/office/whatsapp-channel:latest}
    build:
      context: .
      dockerfile: whatsapp/Dockerfile
    environment:
      WHATSAPP_CLI_HOME: /data
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - whatsapp_data:/data
    init: true
    restart: unless-stopped

  telegram-bot:
    image: ${TELEGRAM_IMAGE:-ghcr.io/arvindrajnaidu/office/telegram-channel:latest}
    build:
      context: .
      dockerfile: telegram/Dockerfile
    environment:
      TELEGRAM_CLI_HOME: /data
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - telegram_data:/data
    init: true
    restart: unless-stopped

volumes:
  whatsapp_data:
  telegram_data:
