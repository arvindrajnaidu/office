name: Publish to npm

on:
  push:
    tags:
      - "core-v*"
      - "whatsapp-v*"
      - "imessage-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Determine package to publish
        id: pkg
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" == core-v* ]]; then
            echo "dir=core" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == whatsapp-v* ]]; then
            echo "dir=whatsapp" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == imessage-v* ]]; then
            echo "dir=imessage" >> $GITHUB_OUTPUT
          else
            echo "Unknown tag: $TAG" && exit 1
          fi

      - run: npm publish --access public
        working-directory: ${{ steps.pkg.outputs.dir }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
